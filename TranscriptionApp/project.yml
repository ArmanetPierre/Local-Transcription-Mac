name: TranscriptionApp
options:
  bundleIdPrefix: com.pierre
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_LANGUAGE: en

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  TranscriptionApp:
    type: application
    platform: macOS
    sources:
      - TranscriptionApp
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pierre.Voxa
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_CFBundleDisplayName: Voxa
        CODE_SIGN_ENTITLEMENTS: TranscriptionApp/Resources/TranscriptionApp.entitlements
        ENABLE_APP_SANDBOX: false
        PRODUCT_NAME: Voxa
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Voxa uses the microphone to record your voice during meetings."
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
        INFOPLIST_KEY_SUFeedURL: "https://armanetpierre.github.io/Local-Transcription-Mac/appcast.xml"
        INFOPLIST_KEY_SUPublicEDKey: "Onrg6i4OYFeEFszu974HeE7wZk8F2p8o9ZkgaDvllhw="
        INFOPLIST_KEY_SUEnableAutomaticChecks: true
